{{- if eq .Values.workspace.type "pvc" }}
{{- with $pvc := .Values.workspace.pvc }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "modelcar-maker.fullname" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "modelcar-maker.labels" $ | nindent 4 }}
spec:
  {{- with $pvc.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  {{- with $pvc.accessModes }}
  accessModes:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  resources:
    requests:
      storage: {{ $pvc.size }}
{{- end }}
{{- end }}

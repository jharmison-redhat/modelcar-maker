{{- if .Values.dataScienceConnections.create }}
{{- range $model := .Values.models }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "connection-%s" (include "modelcar-maker.modelcar-dns-normalized-name" $model) | trunc 63 | trimSuffix "-" }}
  namespace: {{ default $.Release.Namespace $.Values.dataScienceConnections.namespace }}
  annotations:
    opendatahub.io/connection-hidden: {{ $model.hidden | default false | quote }}
    opendatahub.io/connection-type-protocol: uri
    opendatahub.io/connection-type-ref: uri-v1
    openshift.io/display-name: "{{ $model.repo }}{{ with $model.tag }} ({{ . }}){{ end }}"
  labels:
    {{- include "modelcar-maker.labels" $ | nindent 4 }}
    opendatahub.io/dashboard: "true"
type: Opaque
data:
  URI: {{ printf "oci://%s" (include "modelcar-maker.modelcar-destination-image" (list $model $)) | b64enc }}
{{- end }}
{{- end }}

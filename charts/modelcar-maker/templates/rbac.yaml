{{- if .Values.modelcar.imageStream.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "modelcar-maker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "modelcar-maker.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: registry-editor
subjects:
- kind: ServiceAccount
  name: {{ include "modelcar-maker.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

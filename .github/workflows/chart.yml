name: Build & Publish Helm Chart (main branch)

on:
  push:
    paths:
      - "charts/**"
      - .github/workflows/chart.yml

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare chart publish for updated charts
        run: .github/workflows/chart_versions.sh
        env:
          BEFORE_SHA: ${{ github.event.before }}
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

name: Build & Push (main branch)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - Containerfile
      - README.md
      - LICENSE
      - pyproject.toml
      - tox.ini
      - .github/workflows/build-push-main.yml

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install tox
      - run: |
          echo -n '{"auths":{}}' > "$REGISTRY_AUTH_FILE"
          tox run -e py312
        env:
          REGISTRY_AUTH_FILE: ${{ github.workspace }}/config.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install tox
      - run: tox run -e lint

  container:
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/modelcar-maker:main
          provenance: false
